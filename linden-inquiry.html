<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Showing | 233-19 Linden Blvd | Sawyers Premier Realty</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0B1C2E;min-height:100vh;padding:2rem;}
.wrap{max-width:560px;margin:0 auto;}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid rgba(201,168,76,0.2);}
.logo{color:#fff;font-size:14px;font-weight:500;text-decoration:none;}
.phone{color:#C9A84C;font-size:13px;font-weight:600;text-decoration:none;}
.card{background:#fff;border-radius:14px;padding:36px;}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#9E7E34;font-weight:600;margin-bottom:10px;}
h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#0B1C2E;margin-bottom:6px;}
h1 em{font-style:italic;color:#9E7E34;}
.prop{font-size:13px;color:#6B7A8D;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #EDE5D4;}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
label{font-size:11px;font-weight:600;color:#6B7A8D;text-transform:uppercase;letter-spacing:.06em;}
input,select,textarea{border:1px solid #D5D9E0;border-radius:7px;padding:11px 13px;font-size:14px;font-family:'DM Sans',sans-serif;color:#0B1C2E;outline:none;width:100%;}
input:focus,select:focus,textarea:focus{border-color:#C9A84C;box-shadow:0 0 0 3px rgba(201,168,76,0.12);}
textarea{resize:vertical;min-height:80px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{width:100%;background:#C9A84C;color:#0B1C2E;border:none;padding:14px;border-radius:7px;font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;}
.note{font-size:11px;color:#9AA0A8;text-align:center;margin-top:10px;}
.back{display:block;text-align:center;margin-top:20px;color:rgba(255,255,255,0.5);font-size:13px;text-decoration:none;}
.back:hover{color:#C9A84C;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a href="https://sawyersrealty.com/" class="logo">🏠 Sawyers Premier Realty</a>
    <a href="tel:5162161394" class="phone">📞 (516) 216-1394</a>
  </div>
  <div class="card">
    <div class="eyebrow">Request a Showing</div>
    <h1>233-19 Linden Blvd<br><em>Cambria Heights, NY 11411</em></h1>
    <p class="prop">Legal 2-Family Duplex · 4 Beds · 2 Baths · $1,100,000 · MLS# 1025034</p>
    <form name="linden-blvd-inquiry" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" action="/thank-you.html">
      <input type="hidden" name="form-name" value="linden-blvd-inquiry">
      <input type="hidden" name="property" value="233-19 Linden Blvd, Cambria Heights NY 11411 - Legal 2-Family $1,100,000 MLS#1025034">
      <p style="display:none"><label>Skip: <input name="bot-field"></label></p>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="full-name" placeholder="Your full name" required>
      </div>
      <div class="row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" placeholder="(516) 555-0100" required>
        </div>
      </div>
      <div class="form-group">
        <label>I Am A...</label>
        <select name="buyer-type">
          <option value="">Select one...</option>
          <option>Cash Buyer</option>
          <option>Pre-Approved Buyer</option>
          <option>Owner-Occupant Buyer</option>
          <option>Investment Buyer</option>
          <option>1031 Exchange Investor</option>
          <option>Working on Financing</option>
        </select>
      </div>
      <div class="row">
        <div class="form-group">
          <label>Preferred Date</label>
          <input type="date" name="preferred-date">
        </div>
        <div class="form-group">
          <label>Preferred Time</label>
          <select name="preferred-time">
            <option value="">Select...</option>
            <option>10:00 AM</option><option>11:00 AM</option>
            <option>12:00 PM</option><option>1:00 PM</option>
            <option>2:00 PM</option><option>3:00 PM</option>
            <option>4:00 PM</option><option>5:00 PM</option>
            <option>6:00 PM</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Message (optional)</label>
        <textarea name="message" placeholder="Any questions about the property..."></textarea>
      </div>
      <button type="submit" class="btn">Request My Showing →</button>
      <p class="note">We respond within 2 hours · 7 days a week · 10AM–7PM</p>
    </form>
  </div>
  <a href="/linden-blvd.html" class="back">← Back to Property Details</a>
</div>
</body>
</html>
